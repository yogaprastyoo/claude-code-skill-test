<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to My Website</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            text-align: center;
            color: white;
            padding: 40px;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 16px;
            text-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        p {
            font-size: 1.2rem;
            opacity: 0.85;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome to My Website</h1>
        <p>Selamat datang! Senang kamu ada di sini.</p>
    </div>
</body>
</html>
